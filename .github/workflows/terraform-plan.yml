name: "Terraform Plan"

on:
  pull_request:
    branches: [ "main" ]
    paths: "projects/practice-service/**"

jobs:
  terraform:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read #코드를 읽어올 수 있는 권한
      pull-requests: write #PR에 댓글을 달 수 있는 권한
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Format
        run: terraform fmt -check -recursive
        working-directory: projects/practice-service/dev
      
      - name: Init
        run: terraform init
        working-directory: projects/practice-service/dev
      
      - name: Plan
        id: plan
        working-directory: projects/practice-service/dev
        run: terraform plan -no-color

      # 7. PR에 결과 댓글 달기
      - name: Post Plan Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Plan Result
            #### 📂 Directory: \`projects/practice-service/dev\`
            #### 🛡️ Security & Format Check: \`Passed\`
            
            <details><summary>🔍 상세 변경 내용 보기 (Click)</summary>
            
            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pushed by: @${context.actor}, Action: \`${context.eventName}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
